# ── Build settings ──
[build]
  command = "npm run build"
  publish = "dist"

# ── React Router fix ──
# Without this, refreshing any page other than / gives a 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Asset caching ──
# Vite hashes all JS/CSS filenames on build, so they can be cached forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML must NOT be cached ──
# index.html is the entry point; it must always be fresh
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"